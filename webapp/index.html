<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>3D-модель</title>
  <!-- Telegram Web App SDK: розтягує вікно, дає тему тощо -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    /* iframe займає весь екран міні-застосунку */
    iframe {
      border: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>
  <!--
    Sketchfab-ембед. Модель: mechspider.
    Щоб показати іншу модель — заміни ID у src (частина .../models/<ID>/embed).
    У майбутньому цей <iframe> можна замінити на <canvas> зі сценою Babylon.js.
  -->
  <iframe
    title="mechspider"
    src="https://sketchfab.com/models/ea5929bbc0a242b5876a661fffe39842/embed?autospin=1&autostart=1&ui_theme=dark"
    allow="autoplay; fullscreen; xr-spatial-tracking"
    allowfullscreen
    mozallowfullscreen="true"
    webkitallowfullscreen="true">
  </iframe>

  <script>
    // Готуємо Telegram Web App: розгортаємо на весь екран.
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
  </script>
</body>
</html>
